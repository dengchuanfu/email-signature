<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邮箱签名生成器</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <main class="workspace">
      <section class="intro-note">
        <p class="eyebrow">Email Signature Generator</p>
        <p class="intro-text">固定使用默认模板效果，左侧填写信息，右侧实时预览，并可直接复制或下载 HTML。</p>
      </section>

      <section class="editor-layout">
        <section class="editor-panel">
          <div class="section-head">
            <div>
              <h2>填写签名信息</h2>
            </div>
          </div>

          <form id="signatureForm" class="editor-form">
            <div class="field-group">
              <h3>个人信息</h3>
              <div class="field-grid field-grid-personal">
                <label class="field-name">
                  <span>姓名</span>
                  <input class="input-name-short" name="name" value="Monster" maxlength="40">
                </label>
                <label>
                  <span>职位</span>
                  <input name="title" value="IT工程师" maxlength="40">
                </label>
                <label>
                  <span>部门</span>
                  <input name="department" value="秘书处" maxlength="50">
                </label>
                <label class="field-accent">
                  <span>强调色</span>
                  <div class="color-input">
                    <input name="accent" type="color" value="#5273ff">
                    <input class="input-accent-short" name="accentText" value="#5273ff" maxlength="7">
                  </div>
                </label>
              </div>
            </div>

            <div class="field-group">
              <h3>联系方式</h3>
              <div class="field-grid">
                <label>
                  <span>邮箱</span>
                  <input name="email" value="dengchuanfu@cenkersz.com" maxlength="80">
                </label>
                <label>
                  <span>手机</span>
                  <input name="mobile" value="183-3333-3333" maxlength="40">
                </label>
                <label class="field-span-full">
                  <span>地址</span>
                  <input name="address" value="深圳市龙华区大浪街道恒大时尚慧谷6A-11层" maxlength="120">
                </label>
                <label>
                  <span>公司</span>
                  <input name="company" value="岑科科技（深圳）集团有限公司" maxlength="120">
                </label>
                <label>
                  <span>网址</span>
                  <input name="website" value="https://www.cenkersz.com" maxlength="120">
                </label>
              </div>
            </div>

            <div class="field-group">
              <h3>图片</h3>
              <div class="field-grid">
                <label class="field-span-full">
                  <span>上传图片</span>
                  <input id="imageUpload" type="file" accept="image/*">
                </label>
              </div>
            </div>

            <div class="field-group">
              <h3>底部宣传条</h3>
              <div class="field-grid">
                <label>
                  <span>标题</span>
                  <input name="promoTitle" value="岑科电感&amp;变压器" maxlength="80">
                </label>
                <label>
                  <span>按钮文字（默认跳转网址链接）</span>
                  <input name="ctaText" value="更多&gt;&gt;" maxlength="30">
                </label>
                <label class="field-span-full">
                  <span>副标题</span>
                  <input name="promoSubtitle" value="成为全球元器件解决方案提供商" maxlength="120">
                </label>
              </div>
            </div>
          </form>

          <div class="action-row">
            <button id="copyHtmlButton" class="action-button" type="button">复制 HTML</button>
            <button id="downloadHtmlButton" class="action-button action-button-secondary" type="button">下载 HTML</button>
            <button id="resetButton" class="text-button" type="button">恢复默认</button>
          </div>
        </section>

        <section class="preview-panel">
          <div class="section-head">
            <div>
              <h2>最终生成效果</h2>
            </div>
          </div>

          <div class="preview-shell">
            <div class="preview-canvas">
              <div id="signaturePreview" class="signature-preview"></div>
            </div>
          </div>

          <label class="html-output">
            <span>导出 HTML</span>
            <textarea id="htmlOutput" readonly spellcheck="false"></textarea>
          </label>
        </section>
      </section>
    </main>

    <footer class="site-footer">
      <a class="github-link" href="https://github.com/dengchuanfu/email-signature" target="_blank" rel="noopener noreferrer" aria-label="GitHub repository: dengchuanfu/email-signature">
        <svg class="github-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.1 3.29 9.42 7.86 10.95.58.1.79-.25.79-.56v-2.17c-3.2.7-3.87-1.37-3.87-1.37-.52-1.33-1.28-1.68-1.28-1.68-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.03 1.75 2.69 1.24 3.35.95.1-.74.4-1.24.73-1.53-2.55-.29-5.23-1.28-5.23-5.68 0-1.26.45-2.29 1.18-3.09-.12-.29-.51-1.46.11-3.05 0 0 .97-.31 3.16 1.18A10.98 10.98 0 0 1 12 6.04c.98 0 1.95.13 2.87.39 2.19-1.49 3.15-1.18 3.15-1.18.63 1.59.24 2.76.12 3.05.74.8 1.18 1.83 1.18 3.09 0 4.41-2.69 5.38-5.25 5.67.41.36.78 1.06.78 2.13v3.2c0 .31.21.67.8.56A11.51 11.51 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z" />
        </svg>
        <span>&#20316;&#32773; GitHub</span>
      </a>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
